<!DOCTYPE html>
<html lang="en" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Access Gate | Postman to Pytest Migrator</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        orange: { 500: '#FF6B00', 600: '#E05E00' },
                        blue: { 500: '#0A66C2', 600: '#0854A0' },
                        slate: { 900: '#0F172A', 800: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-primary text-primary transition-all duration-300 min-h-screen flex items-center justify-center relative overflow-hidden px-4">

    <!-- Floating Background Particles -->
    <div class="particles-container"></div>

    <!-- Login Container -->
    <div class="w-full max-w-md relative z-10">
        <!-- Logo Branding Header wrapper -->
        <div class="text-center mb-8">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-orange-500 to-blue-500 p-0.5 flex items-center justify-center shadow-lg mx-auto mb-4 animate-bounce">
                <div class="w-full h-full bg-slate-900 rounded-[14px] flex items-center justify-center">
                    <svg class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">Workspace Session Sign-in</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Access your local Pytest parsing and database analytics.</p>
        </div>

        <!-- Glassmorphism Form container -->
        <div class="glass-panel border border-slate-200 dark:border-slate-800/60 rounded-3xl p-8 shadow-2xl relative overflow-hidden">
            <span class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-orange-500 to-blue-500"></span>

            {% if error %}
            <!-- Error messages alert box -->
            <div class="mb-6 p-4 bg-rose-500/10 border border-rose-500/30 rounded-2xl text-rose-500 text-sm flex items-start space-x-2">
                <svg class="w-5 h-5 flex-shrink-0 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Form -->
            <form action="/login" method="POST" class="space-y-6">
                <!-- Email field -->
                <div>
                    <label for="login-email" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">QA / Developer Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206"></path>
                            </svg>
                        </span>
                        <input type="email" id="login-email" name="email" required placeholder="qa_engineer@company.com" 
                               class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 dark:border-slate-800 bg-white dark:bg-slate-900/40 text-slate-850 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <!-- Password field -->
                <div>
                    <label for="login-password" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Developer Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </span>
                        <input type="password" id="login-password" name="password" required placeholder="••••••••" 
                               class="w-full pl-10 pr-12 py-3 rounded-xl border border-slate-300 dark:border-slate-800 bg-white dark:bg-slate-900/40 text-slate-850 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all">
                        
                        <!-- Show Password toggle button standard -->
                        <button type="button" id="toggle-password-btn" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300">
                            <!-- Eye Open SVG icon -->
                            <svg class="eye-open w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                            <!-- Eye Closed SVG icon -->
                            <svg class="eye-closed w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Remember Me standard preferences styling -->
                <div class="flex items-center justify-between text-xs text-slate-400">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" name="remember" class="accent-orange-500 rounded focus:ring-0">
                        <span>Remember credentials</span>
                    </label>
                    <a href="#" class="hover:text-white transition">Need configuration assistance?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full py-3.5 rounded-xl text-sm font-bold bg-gradient-to-r from-orange-500 to-orange-600 text-white shadow-lg shadow-orange-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all btn-primary">
                    Authenticate workspace session
                </button>
            </form>

            <div class="text-center mt-6 pt-4 border-t border-slate-200 dark:border-slate-200/10 text-sm">
                <span class="text-slate-500 dark:text-slate-400">Don't have an account? </span>
                <a href="/register" class="text-orange-500 font-bold hover:underline">Register</a>
            </div>
        </div>

        <div class="text-center mt-6 text-xs text-slate-500">
            <a href="/" class="hover:text-slate-300 transition">← Back to intro landing</a>
        </div>
    </div>

    <!-- Global App scripts -->
    <script src="/static/js/app.js"></script>
</body>
</html>
