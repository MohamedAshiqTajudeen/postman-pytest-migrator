<!DOCTYPE html>
<html lang="en" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Developer Account | Postman to Pytest Migrator</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        orange: { 500: '#FF6B00', 600: '#E05E00' },
                        blue: { 500: '#0A66C2', 600: '#0854A0' },
                        slate: { 900: '#0F172A', 800: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-primary text-primary transition-all duration-300 min-h-screen flex items-center justify-center relative overflow-hidden px-4">

    <!-- Floating Background Particles -->
    <div class="particles-container"></div>

    <div class="w-full max-w-md relative z-10 py-8">
        <!-- Header banner -->
        <div class="text-center mb-6">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-orange-500 to-blue-500 p-0.5 flex items-center justify-center shadow-lg mx-auto mb-4 scale-95">
                <div class="w-full h-full bg-slate-900 rounded-[14px] flex items-center justify-center">
                    <svg class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
            <h2 id="register-header-heading" class="text-2xl font-extrabold tracking-tight dark:text-white">Workspace Registration</h2>
            <p id="register-header-subtext" class="text-sm text-slate-500 dark:text-slate-400 mt-1">Join the hybrid Postman-to-Pytest migration workspace.</p>
        </div>

        <!-- Glassmorphism Form card -->
        <div class="glass-panel border border-slate-705/10 dark:border-slate-800/60 rounded-3xl p-8 shadow-2xl relative overflow-hidden">
            <span class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-orange-500 to-blue-500"></span>

            <!-- Alert notification box for err/success feedback -->
            <div id="register-alert-box" class="hidden mb-6 p-4 bg-rose-500/10 border border-rose-500/30 rounded-2xl text-rose-500 text-sm flex items-start space-x-2">
                <svg class="w-5 h-5 flex-shrink-0 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <span id="register-alert-message"></span>
            </div>

            {% if error %}
            <div class="mb-6 p-4 bg-rose-500/10 border border-rose-500/30 rounded-2xl text-rose-500 text-sm flex items-start space-x-2">
                <svg class="w-5 h-5 flex-shrink-0 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Form -->
            <form id="register-form" action="/register" method="POST" class="space-y-4">
                
                <!-- Full name field -->
                <div>
                    <label for="reg-fullname" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Full Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </span>
                        <input type="text" id="reg-fullname" name="full_name" required placeholder="Alex Mercer"
                               class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-800 bg-slate-100 dark:bg-slate-900/40 text-slate-900 dark:text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <!-- Email field -->
                <div>
                    <label for="reg-email" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">QA / Developer Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206"></path>
                            </svg>
                        </span>
                        <input type="email" id="reg-email" name="email" required placeholder="alex@company.com"
                               class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-800 bg-slate-100 dark:bg-slate-900/40 text-slate-900 dark:text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all">
                    </div>
                </div>

                <!-- Password field -->
                <div>
                    <label for="reg-password" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Secret Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </span>
                        <input type="password" id="reg-password" name="password" required placeholder="Min. 8 characters" minlength="8"
                               class="w-full pl-10 pr-12 py-2.5 rounded-xl border border-slate-300 dark:border-slate-800 bg-slate-100 dark:bg-slate-900/40 text-slate-900 dark:text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all">
                        
                        <!-- Toggle Password button -->
                        <button type="button" id="toggle-reg-password-btn" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300">
                            <svg class="eye-open w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                            <svg class="eye-closed w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                            </svg>
                        </button>
                    </div>

                    <!-- Password Strength Meter -->
                    <div class="mt-2 text-xs flex flex-col space-y-1.5">
                        <div class="flex items-center justify-between text-[11px]">
                            <span class="text-slate-550 dark:text-slate-500 font-semibold uppercase">Strength:</span>
                            <span id="password-strength-text" class="font-bold text-slate-400">Too Short</span>
                        </div>
                        <div class="h-1.5 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden flex">
                            <div id="password-strength-bar" class="h-full bg-slate-400 rounded-full transition-all duration-300 w-0"></div>
                        </div>
                        <div class="text-[10px] text-slate-500 dark:text-slate-400 leading-normal mt-1 space-y-0.5">
                            <span class="block">Policy: Min. 8 characters with 1 uppercase, 1 lowercase, 1 number, and 1 special character.</span>
                        </div>
                    </div>
                </div>

                <!-- Confirm Password field -->
                <div>
                    <label for="reg-confirm-password" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Confirm Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                        </span>
                        <input type="password" id="reg-confirm-password" name="confirm_password" required placeholder="Repeat chosen password" minlength="8"
                               class="w-full pl-10 pr-12 py-2.5 rounded-xl border border-slate-300 dark:border-slate-800 bg-slate-100 dark:bg-slate-900/40 text-slate-900 dark:text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-all">
                        
                        <!-- Toggle Confirm Password button -->
                        <button type="button" id="toggle-reg-confirm-btn" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300">
                            <svg class="eye-open w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                            <svg class="eye-closed w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="reg-submit-btn" class="w-full py-3.5 rounded-xl text-sm font-bold bg-gradient-to-r from-orange-500 to-orange-600 text-white shadow-lg shadow-orange-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all btn-primary">
                    Create Workspace Account
                </button>
            </form>
        </div>

        <div class="text-center mt-6 text-sm">
            <span class="text-slate-500">Already have an account? </span>
            <a href="/login" class="text-orange-500 font-bold hover:underline">Sign In</a>
        </div>
    </div>

    <!-- Client side checks script logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Restore chosen system theme from localStorage
            const savedTheme = localStorage.getItem('theme-preference');
            if (savedTheme === 'light') {
                document.documentElement.classList.remove('dark-mode', 'dark');
            } else {
                document.documentElement.classList.add('dark-mode', 'dark');
            }

            // Show alert helper
            const alertBox = document.getElementById('register-alert-box');
            const alertMsg = document.getElementById('register-alert-message');
            const showAlert = (message) => {
                alertMsg.textContent = message;
                alertBox.classList.remove('hidden');
            };
            const hideAlert = () => {
                alertBox.classList.add('hidden');
            };

            // Passwords Match & Complexity Client Validation
            const form = document.getElementById('register-form');
            const passwordInput = document.getElementById('reg-password');
            const confirmInput = document.getElementById('reg-confirm-password');
            const strengthText = document.getElementById('password-strength-text');
            const strengthBar = document.getElementById('password-strength-bar');

            passwordInput.addEventListener('input', () => {
                const val = passwordInput.value;
                if (!val) {
                    strengthText.textContent = "Too Short";
                    strengthText.className = "font-bold text-slate-400";
                    strengthBar.className = "h-full bg-slate-400 rounded-full transition-all duration-300 w-0";
                    return;
                }

                const lengthOk = val.length >= 8;
                const upperOk = /[A-Z]/.test(val);
                const lowerOk = /[a-z]/.test(val);
                const numOk = /[0-9]/.test(val);
                const specialOk = /[^A-Za-z0-9]/.test(val);

                let strength = "Weak";
                let barClass = "bg-rose-500 w-1/3";
                let textClass = "text-rose-500";

                const meetsAll = lengthOk && upperOk && lowerOk && numOk && specialOk;
                
                if (meetsAll) {
                    strength = "Strong";
                    barClass = "bg-teal-500 w-full";
                    textClass = "text-teal-500";
                } else if (lengthOk && (upperOk || lowerOk || numOk || specialOk)) {
                    strength = "Medium";
                    barClass = "bg-amber-500 w-2/3";
                    textClass = "text-amber-500";
                } else {
                    strength = "Weak";
                    barClass = "bg-rose-500 w-1/3";
                    textClass = "text-rose-500";
                }

                strengthText.textContent = strength;
                strengthText.className = "font-bold transition-colors duration-300 " + textClass;
                strengthBar.className = "h-full rounded-full transition-all duration-300 " + barClass;
            });

            form.addEventListener('submit', (e) => {
                hideAlert();
                if (passwordInput.value !== confirmInput.value) {
                    e.preventDefault();
                    showAlert("Passwords do not match. Please verify and re-type.");
                    return false;
                }
                
                const val = passwordInput.value;
                const lengthOk = val.length >= 8;
                const upperOk = /[A-Z]/.test(val);
                const lowerOk = /[a-z]/.test(val);
                const numOk = /[0-9]/.test(val);
                const specialOk = /[^A-Za-z0-9]/.test(val);

                if (!lengthOk || !upperOk || !lowerOk || !numOk || !specialOk) {
                    e.preventDefault();
                    showAlert("Password does not meet complexity requirements. Minimum 8 characters, with 1 uppercase, 1 lowercase, 1 number, and 1 special character required.");
                    return false;
                }
            });

            // Interactive Show / Hide toggles
            const setupToggle = (btnId, inputId) => {
                const button = document.getElementById(btnId);
                const input = document.getElementById(inputId);
                
                if (button && input) {
                    button.addEventListener('click', () => {
                        const isPassword = input.getAttribute('type') === 'password';
                        input.setAttribute('type', isPassword ? 'text' : 'password');
                        
                        const eyeOpen = button.querySelector('.eye-open');
                        const eyeClosed = button.querySelector('.eye-closed');
                        if (eyeOpen && eyeClosed) {
                            eyeOpen.classList.toggle('hidden');
                            eyeClosed.classList.toggle('hidden');
                        }
                    });
                }
            };

            setupToggle('toggle-reg-password-btn', 'reg-password');
            setupToggle('toggle-reg-confirm-btn', 'reg-confirm-password');
        });
    </script>
</body>
</html>
